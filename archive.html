<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ARCHIVE — 목록</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="archive-header">
  <span>FIELD ARCHIVE</span>
  <span class="count" id="post-count"></span>
</header>

<main>
  <section class="view" id="view-list">
    <!-- 글 목록: JS가 채웁니다 -->
  </section>

  <section class="view" id="view-grid">
    <!-- 사진 피드: JS가 채웁니다 -->
  </section>

  <section class="view" id="view-map">
    <div id="map-canvas"></div>
  </section>
</main>

<nav class="view-switch">
  <button data-view="map" aria-label="지도로 보기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-11.5A7 7 0 0 0 5 9.5C5 14.5 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.2"/></svg>
  </button>
  <button data-view="list" aria-label="글 목록으로 보기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
  </button>
  <button data-view="grid" class="active" aria-label="사진 피드로 보기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="6" height="6"/><rect x="9.5" y="3" width="6" height="6" transform="translate(6,0)"/><rect x="3" y="9.5" width="6" height="6"/></svg>
  </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/posts.js"></script>
<script src="js/app.js"></script>
<script>
  qs("#post-count") && (document.getElementById("post-count").textContent = POSTS.length + " POSTS");
  qs("#view-grid").classList.add("active");
  initArchive();
</script>

</body>
</html>
