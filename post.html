<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ARCHIVE — 포스트</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg-primary: #121212;
  --bg-secondary: #1c1b19;
  --text-primary: #ede7da;
  --text-muted: #8c887e;
  --accent: #c9a227;
  --font-serif: 'Noto Serif KR', serif;
  --font-sans: 'Noto Sans KR', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); }
a { color: inherit; text-decoration: none; }

.post-wrap { max-width:560px; margin:0 auto; padding-bottom:60px; }
.post-back { position: sticky; top:0; z-index:5; padding:14px 20px; font-family: var(--font-mono); font-size:12px; color: var(--accent); background: linear-gradient(var(--bg-primary) 70%, transparent); display:block; }
.post-hero { width:100%; aspect-ratio: 4/3; object-fit:cover; display:block; }
.post-meta { padding:20px 20px 0; }
.post-title { font-family: var(--font-serif); font-size:24px; font-weight:700; margin:0 0 12px; line-height:1.4; }
.post-stamp { font-family: var(--font-mono); font-size:11px; color: var(--text-muted); border-left:2px solid var(--accent); padding-left:10px; line-height:1.8; margin-bottom:22px; }
.post-stamp b { color: var(--text-primary); font-weight:500; }
.post-body { padding:4px 20px; }
.post-body p { font-family: var(--font-serif); font-size:16px; line-height:1.95; margin:0 0 22px; }
.post-body img { width:100%; display:block; margin:6px 0 26px; }
.post-map-label { font-family: var(--font-mono); font-size:11px; letter-spacing:.1em; color: var(--text-muted); padding:0 20px 8px; }
#post-map { width:100%; height:260px; margin:0 0 40px; filter: grayscale(0.15); }
</style>
</head>
<body>

<div class="post-wrap">
  <a class="post-back" href="archive.html">&larr; 목록으로</a>

  <img id="post-hero" class="post-hero" src="" alt="">

  <div class="post-meta">
    <h1 class="post-title" id="post-title"></h1>
    <div class="post-stamp">
      <div><b>ADDR</b>&nbsp;&nbsp;<span id="post-address"></span></div>
      <div><b>GEO</b>&nbsp;&nbsp;&nbsp;<span id="post-coords"></span></div>
    </div>
  </div>

  <div class="post-body" id="post-body"></div>

  <div class="post-map-label">LOCATION</div>
  <div id="post-map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* 포스트 데이터 — archive.html과 동일한 내용. 포스트를 추가/수정할 때는
   이 파일과 archive.html 양쪽의 POSTS 배열을 똑같이 맞춰주세요. */
const POSTS = [
  {
    id: "001",
    title: "옥상 위에 놓인 세탁기",
    mainImage: "https://picsum.photos/seed/archive001/800/600",
    address: "서울특별시 종로구 자하문로 10길",
    lat: 37.5826, lng: 126.9701,
    body: [
      { type: "text", content: "3층짜리 상가 건물 옥상, 난간도 없는 자리에 드럼세탁기 한 대가 놓여 있었다. 전선은 허공에서 끊겨 있었고, 문은 열린 채로 비를 받고 있었다." },
      { type: "image", src: "https://picsum.photos/seed/archive001b/900/600" },
      { type: "text", content: "누가 왜 저기에 세탁기를 올려두었는지는 알 수 없다. 다만 이 도시는 설명되지 않는 사물을 아무렇지 않게 통과시킨다는 것만은 분명했다." }
    ]
  },
  {
    id: "002",
    title: "반지하 창문의 화분들",
    mainImage: "https://picsum.photos/seed/archive002/800/600",
    address: "서울특별시 마포구 성지길",
    lat: 37.5519, lng: 126.9376,
    body: [
      { type: "text", content: "지상에서 삼십 센티미터쯤 아래, 화분 여섯 개가 나란히 창턱에 줄지어 있었다. 해가 들지 않는 방향인데도 잎은 이상하리만치 진한 초록이었다." },
      { type: "image", src: "https://picsum.photos/seed/archive002b/900/600" },
      { type: "text", content: "지나가던 사람들은 대부분 눈높이보다 낮은 이 풍경을 보지 못하고 지나쳤다. 보려면 몸을 숙여야 하는 것들이 있다." }
    ]
  },
  {
    id: "003",
    title: "공사장 가벽에 붙은 전단지",
    mainImage: "https://picsum.photos/seed/archive003/800/600",
    address: "서울특별시 영등포구 문래동",
    lat: 37.5177, lng: 126.8946,
    body: [
      { type: "text", content: "철거 예정 표지판 바로 옆에 코팅도 안 된 전단지가 붙어 있었다. 잃어버린 고양이를 찾는다는 내용이었고, 연락처 아래에는 손글씨로 '아직 여기 있을지도 모릅니다'라고 적혀 있었다." },
      { type: "image", src: "https://picsum.photos/seed/archive003b/900/600" },
      { type: "text", content: "가벽은 곧 철거될 것이고 전단지도 함께 사라질 것이다. 그 사실이 이 문장을 여기에 옮겨 적어야 할 이유가 됐다." }
    ]
  }
];

function qs(sel, root) { return (root || document).querySelector(sel); }

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const post = POSTS.find(function (p) { return p.id === id; }) || POSTS[0];

qs("#post-hero").src = post.mainImage;
qs("#post-hero").alt = post.title;
qs("#post-title").textContent = post.title;
qs("#post-address").textContent = post.address;
qs("#post-coords").textContent = post.lat.toFixed(4) + ", " + post.lng.toFixed(4);

qs("#post-body").innerHTML = post.body.map(function (block) {
  if (block.type === "text") return "<p>" + block.content + "</p>";
  if (block.type === "image") return '<img src="' + block.src + '" alt="' + post.title + '" loading="lazy">';
  return "";
}).join("");

const map = L.map("post-map", { zoomControl: false, dragging: true }).setView([post.lat, post.lng], 15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors", maxZoom: 19
}).addTo(map);
L.marker([post.lat, post.lng]).addTo(map);
setTimeout(function () { map.invalidateSize(); }, 150);
</script>
</body>
</html>
